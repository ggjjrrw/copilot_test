# MySQL Secret示例 - 用于存储敏感的数据库连接信息
apiVersion: v1
kind: Secret
metadata:
  name: mysql-secret
  labels:
    {{- include "myhome.labels" . | nindent 4 }}
type: Opaque
data:
  # 注意：这里的值应该是base64编码后的密码
  # 在实际部署时，请替换为实际的base64编码密码
  # 例如：echo -n "your_password" | base64
  password: {{ .Values.mysql.password | b64enc | quote }}